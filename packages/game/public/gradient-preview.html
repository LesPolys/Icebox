<!DOCTYPE html>
<html><head><style>
body { background: #1e1e2e; margin: 40px auto; max-width: 500px; font-family: monospace; }
.swatch { padding: 16px 24px; margin: 4px 0; border-radius: 8px; display: flex; justify-content: space-between; }
.swatch span { font-size: 15px; font-weight: bold; }
.dark { color: #1e1e2e; }
.light { color: #e5e5e5; }
h2 { color: #e5e5e5; text-align: center; margin-bottom: 6px; }
p { color: #a0a0a0; text-align: center; font-size: 12px; margin-bottom: 18px; }
.existing { border: 2px solid #fff; }
.new { border: 2px dashed #555; }
.tag { font-size: 11px; opacity: 0.7; }
.grad { height: 50px; border-radius: 8px; margin-top: 16px; }
.label { color: #666; text-align: center; font-size: 11px; margin-top: 12px; }
</style></head><body>
<h2>Icebox Accent Gradient v2</h2>
<p>smoother green transition + deeper dark end</p>
<div class="swatch existing" style="background:#D4FF00"><span class="dark">chartreuse</span><span class="dark">#D4FF00 <span class="tag">(exists)</span></span></div>
<div class="swatch new" style="background:#A0DD22"><span class="dark">lime</span><span class="dark">#A0DD22 <span class="tag">(new)</span></span></div>
<div class="swatch new" style="background:#66CC55"><span class="dark">spring</span><span class="dark">#66CC55 <span class="tag">(new)</span></span></div>
<div class="swatch new" style="background:#33BB88"><span class="dark">emerald</span><span class="dark">#33BB88 <span class="tag">(new)</span></span></div>
<div class="swatch existing" style="background:#00CCAA"><span class="dark">teal</span><span class="dark">#00CCAA <span class="tag">(exists)</span></span></div>
<div class="swatch new" style="background:#1199AA"><span class="light">ocean</span><span class="light">#1199AA <span class="tag">(new)</span></span></div>
<div class="swatch new" style="background:#336688"><span class="light">slate</span><span class="light">#336688 <span class="tag">(new)</span></span></div>
<div class="swatch new" style="background:#6B55A0"><span class="light">indigo</span><span class="light">#6B55A0 <span class="tag">(new)</span></span></div>
<div class="swatch new" style="background:#3D2255"><span class="light">grape</span><span class="light">#3D2255 <span class="tag">(new)</span></span></div>
<div class="swatch new" style="background:#1A0E2E"><span class="light">abyss</span><span class="light">#1A0E2E <span class="tag">(new)</span></span></div>
<div class="label">continuous gradient</div>
<div class="grad" style="background: linear-gradient(to right, #D4FF00, #A0DD22, #66CC55, #33BB88, #00CCAA, #1199AA, #336688, #6B55A0, #3D2255, #1A0E2E);"></div>
</body></html>
